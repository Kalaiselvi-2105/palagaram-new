kind = "web"
previewPath = "/"
title = "Palagaram Restaurant"
version = "1.0.0"
id = "artifacts/palagaram"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "PORT=5000 pnpm --filter @workspace/palagaram run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/palagaram", "run", "build" ]
publicDir = "artifacts/palagaram/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/"
